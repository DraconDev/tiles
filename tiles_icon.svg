<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Space Background -->
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#1a1a24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </radialGradient>

    <!-- Metal Plate Gradient -->
    <linearGradient id="plate_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#16161d;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#101015;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>

    <!-- Neon Pink Glow -->
    <filter id="pink_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feComposite in="SourceGraphic" in2="blur1" operator="over" />
      <feComposite in="blur2" operator="over" />
    </filter>

    <!-- Cyan Glow -->
    <filter id="cyan_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feComposite in="SourceGraphic" in2="blur1" operator="over" />
      <feComposite in="blur2" operator="over" />
    </filter>

    <!-- Internal Shadow/Bevel -->
    <filter id="bevel" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="-2" dy="-2" in="SourceAlpha" result="offset-top" />
      <feGaussianBlur stdDeviation="3" in="offset-top" result="blur-top" />
      <feComposite operator="out" in="blur-top" in2="SourceAlpha" result="inner-glow" />
      <feFlood flood-color="white" flood-opacity="0.1" result="color-glow" />
      <feComposite operator="in" in="color-glow" in2="inner-glow" result="glow" />
      <feComposite operator="over" in="glow" in2="SourceGraphic" />
    </filter>
  </defs>

  <!-- Main Background Container -->
  <rect width="512" height="512" fill="url(#bg_grad)" rx="100"/>
  
  <!-- Outer Rim Hardware -->
  <rect x="20" y="20" width="472" height="472" rx="85" fill="none" stroke="#2a2a35" stroke-width="2" opacity="0.5"/>
  <rect x="40" y="40" width="432" height="432" rx="70" fill="none" stroke="#16161d" stroke-width="4" opacity="0.8"/>

  <!-- Matrix Grid Underlay -->
  <g stroke="#12121a" stroke-width="1.5">
    <path d="M0 64h512M0 128h512M0 192h512M0 256h512M0 320h512M0 384h512M0 448h512"/>
    <path d="M64 0v512M128 0v512M192 0v512M256 0v512M320 0v512M384 0v512M448 0v512"/>
  </g>

  <!-- Central Tile Matrix -->
  <g transform="translate(10, 10)">
    <!-- Top Left: Crimson Core -->
    <rect x="125" y="125" width="120" height="120" rx="12" fill="url(#plate_grad)" stroke="#ff0055" stroke-width="1.5" filter="url(#bevel)"/>
    <rect x="145" y="145" width="80" height="80" rx="4" fill="#ff0055" opacity="0.85" filter="url(#pink_glow)"/>
    
    <!-- Top Right: Cyan Tech -->
    <rect x="257" y="125" width="120" height="120" rx="12" fill="url(#plate_grad)" stroke="#00ffc8" stroke-width="1.5" filter="url(#bevel)"/>
    <rect x="277" y="145" width="80" height="80" rx="4" fill="#00ffc8" opacity="0.85" filter="url(#cyan_glow)"/>
    
    <!-- Bottom Left: Cyan Tech -->
    <rect x="125" y="257" width="120" height="120" rx="12" fill="url(#plate_grad)" stroke="#00ffc8" stroke-width="1.5" filter="url(#bevel)"/>
    <rect x="145" y="277" width="80" height="80" rx="4" fill="#00ffc8" opacity="0.85" filter="url(#cyan_glow)"/>
    
    <!-- Bottom Right: Crimson Core -->
    <rect x="257" y="257" width="120" height="120" rx="12" fill="url(#plate_grad)" stroke="#ff0055" stroke-width="1.5" filter="url(#bevel)"/>
    <rect x="277" y="277" width="80" height="80" rx="4" fill="#ff0055" opacity="0.85" filter="url(#pink_glow)"/>
  </g>

  <!-- Decorative Circuitry Highlights -->
  <g stroke="#333" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M256 40v60 M256 412v60 M40 256h60 M412 256h60"/>
    <circle cx="256" cy="40" r="3" fill="#333"/>
    <circle cx="256" cy="472" r="3" fill="#333"/>
    <circle cx="40" cy="256" r="3" fill="#333"/>
    <circle cx="472" cy="256" r="3" fill="#333"/>
  </g>

  <!-- Gloss Overlay -->
  <path d="M100 100 Q 256 50 412 100" stroke="white" stroke-width="1" opacity="0.1" fill="none"/>
</svg>
